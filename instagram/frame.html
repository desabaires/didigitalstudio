<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>DI · Frame export</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/tokens.css" />
<link rel="stylesheet" href="ig.css" />
<style>
  html, body { margin:0; padding:0; background:#07070b; }
  #root > * { display: block; }
  #root { display:inline-block; }
</style>
<script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../shared/logo.jsx"></script>
  <script type="text/babel" src="ig-components.jsx"></script>
  <script type="text/babel">
    const Registry = {
      'post-01': PostManifesto,
      'post-02': PostServiceSoftware,
      'post-03': PostTechTip,
      'post-04': PostLaunch,
      'post-05': PostServiceAI,
      'post-06': PostQuote,
      'post-07': PostProcess,
      'post-08': PostCTA,
      'hl-01': HighlightServicios,
      'hl-02': HighlightProceso,
      'hl-03': HighlightCasos,
      'hl-04': HighlightIA,
      'hl-05': HighlightContacto,
    };
    const frame = new URLSearchParams(location.search).get('f') || 'post-01';
    const Comp = Registry[frame] || PostManifesto;
    ReactDOM.createRoot(document.getElementById('root')).render(<Comp />);
    window.__exportPng = async () => {
      await new Promise(r => setTimeout(r, 300));
      const node = document.getElementById('root').firstElementChild;
      const rect = node.getBoundingClientRect();
      const dataUrl = await window.htmlToImage.toPng(node, { width: rect.width, height: rect.height, pixelRatio: 1, cacheBust: true, backgroundColor: '#07070b' });
      return dataUrl;
    };
    window.__downloadPng = async (filename) => {
      const url = await window.__exportPng();
      const a = document.createElement('a');
      a.href = url;
      a.download = filename || (frame + '.png');
      document.body.appendChild(a);
      a.click();
      a.remove();
    };
  </script>
</body>
</html>
